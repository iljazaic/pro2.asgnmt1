<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<script>

    var USERID;
    var USERNAME;
    function login() {//basically the master service
        let name = document.querySelector("#name-input").value;
        USERNAME = name;
        document.querySelector('.all').style.visibility = 'visible';

        document.querySelector('.own').style.visibility = 'visible';
        if (name.length > 0 && name !== "") {


            document.querySelector("#login-frame").style.visibility = "hidden";

            const source = new EventSource('/updates?name=' + name); //primitive tunnel; un-ending connection

            source.addEventListener('updateList', (e) => {
                loadList(JSON.parse(e.data));
            });

            source.addEventListener('updateState', (e) => {
                console.log("updating state")
                const data = JSON.parse(e.data);
                let li = document.querySelector(`[id="${data.id}"]`)
                if (li !== null) {
                    li.querySelector('.state').innerHTML = data.state
                }
            });
        }
    }


    function reserve(id) {
        fetch("/reserve?id=" + id + "&name=" + USERNAME);
    }
    function borrow(id) {
        fetch("/borrow?id=" + id + "&name=" + USERNAME);
    }

    function loadList(list) {
        let el = document.querySelector("#list")
        el.innerHTML = '';

        list.forEach(li => {

            el.innerHTML += `
            <li id="${li.id}" class="${li.state}" style="display:flex;  justify-content:space-between; flex-direction:row; border-bottom: 2px solid black; padding: 5px">
            <p>${li.name}</p>
            <p>${li.id}</p>
            <p class="state">${li.state}</p>
            <button id="rb" onclick="reserve('${li.id}')">Reserve</button>
            <button id="bb" onclick="borrow('${li.id}')">Borrow</button>
            </li>
            `
        });
    }


</script>

<body>
    <div id="login-frame">
        <input id="name-input" /><button onclick="login()">Login</button>
    </div>
    <div class="mainFrame">
        <div class="all">
            <h1>All Vinyls</h1>
            <ul style="display: flex; flex-direction: column; gap:10px" id="list">

            </ul>
        </div>
        <div class="own">
            <h1>Your Vinyls</h1>
            <ul style="display: flex; flex-direction: column; gap:10px" id="list2">

            </ul>
        </div>
    </div>


</body>

<style>
    button {
        border: none;
        border-radius: 10px;
        width: 100px;
        height: 50px;

    }

    h1 {
        text-align: center;
    }


    button:hover {
        border: 5px solid white;
    }


    body {
        background-color: rgb(148, 216, 243);

        font-family: monospace;
        padding: 0;
        margin: 0;
    }


    .mainFrame {
        width: 100vw;
        display: flex;
        flex-direction: row;
    }

    .mainFrame>div {
        min-width: 50vw;
    }


    .reservedOwn {
        background-color: rgb(179, 81, 174);
    }

    .borrowedOwn {
        background-color: rgb(108, 108, 199);
    }

    .reserved {
        background-color: rgb(78, 0, 0);
    }

    .borrowed {
        background-color: rgb(201, 87, 6);
    }


    #bb {
        background-color: greenyellow;
    }

    #rb {
        background-color: purple;
    }


    .borrowed>#bb,
    .borrowedOwn>#bb {
        background-color: gray !important;
    }

    .reserved>#rb,
    .reservedOwn>#rb {
        background-color: grey !important;
    }

    .own,
    .all {
        visibility: hidden;
    }
</style>



</html>
