<script>

    const source = new EventSource('/events?u='+username);


    source.addEventListener('updateList', (e) => {
        loadList(JSON.parse(e.data));
    });

    source.addEventListener('updateState', (e) => {
        const data = JSON.parse(e.data);
    });


    function loadList(list) {
        let el = document.querySelector("#list")
        el.innerHTML = '';

        let s = 0;
        list.forEach(li => {

            el.innerHTML += `
            <li class="${li.status}" style="display='flex'; justify-content='space-between'; width:'50%'">
            <p>${li.name}</p>
            <p>${li.id}</p>
            <p>${li.status}</p>
            <button id="rb" onclick="reserve">Reserve</button>
            <button id="bb" onclick="borrow">Borrow</button>
            </li>
            `
        });
    }
